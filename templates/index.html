<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Software Development Team</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card shadow-lg p-5">

<h1 class="text-center text-primary mb-3">
🤖 AI Software Development Team
</h1>

<p class="text-center text-muted mb-4">
Generate complete software planning using AI Agents.
</p>

<form action="/analyze" method="POST">

<div class="mb-4">

<label class="form-label fw-bold fs-5">
📋 Project Requirement
</label>

<textarea
id="requirement"
class="form-control"
rows="6"
name="requirement"
placeholder="Example: Build a Student Management System"
required></textarea>

</div>

<div class="mb-4">

<h5 class="text-primary">
🚀 Try Sample Projects
</h5>

<div class="d-flex flex-wrap gap-2">

<button type="button" class="btn btn-outline-primary"
onclick="setProject('Online Food Delivery System')">
🍔 Food Delivery
</button>

<button type="button" class="btn btn-outline-success"
onclick="setProject('Hospital Management System')">
🏥 Hospital
</button>

<button type="button" class="btn btn-outline-warning"
onclick="setProject('College Management System')">
🎓 College
</button>

<button type="button" class="btn btn-outline-danger"
onclick="setProject('Library Management System')">
📚 Library
</button>

<button type="button" class="btn btn-outline-info"
onclick="setProject('Hotel Booking System')">
🏨 Hotel
</button>

</div>

</div>

<div class="d-grid">

<button id="analyzeBtn"
type="submit"
class="btn btn-primary btn-lg">

🚀 Analyze Requirement

</button>

</div>

</form>

</div>

</div>

</div>

</div>


<!-- Loading Screen -->

<div id="loadingScreen">

<div class="loading-box">

<h2>🤖 AI Agents Working...</h2>

<p id="status">📋 Requirement Analyst...</p>

<div class="spinner"></div>

<p>Please wait while AI generates your project.</p>

</div>

</div>


<script>

function setProject(project){

document.getElementById("requirement").value=project;

}

document.querySelector("form").addEventListener("submit",function(){

document.getElementById("loadingScreen").style.display="flex";

const status=document.getElementById("status");

const steps=[

"📋 Requirement Analyst ✔",

"📅 Project Manager ✔",

"💻 Developer ✔",

"🧪 QA Tester ✔",

"📄 Documentation Agent ✔"

];

let i=0;

const timer=setInterval(function(){

if(i<steps.length){

status.innerHTML=steps[i];

i++;

}

else{

clearInterval(timer);

}

},700);

});

</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
